name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.19.0 dagshub pandas scikit-learn

      - name: Run MLflow training
        env:
          DAGSHUB_USER_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          mlflow run MLProject --experiment-name "Healthcare CVE Classification" --env-manager=local

      - name: Commit and push results
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: automated mlflow run results [skip ci]"
          file_pattern: 'mlruns/*'

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Get Latest Run ID
        id: get_run_id
        env:
          DAGSHUB_USER_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          export MLFLOW_TRACKING_URI=file:./mlruns
          RUN_ID=$(python -c "import mlflow; print(mlflow.search_runs(experiment_names=['Healthcare CVE Classification']).iloc[0].run_id)")
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT

      - name: Build MLflow Model Image
        run: |
          mlflow models build-docker -m "runs:/${{ steps.get_run_id.outputs.run_id }}/model" -n "tmp-model-image" --install-mlflow

      - name: Tag Docker Image
        run: |
          docker tag tmp-model-image ${{ vars.DOCKERHUB_USERNAME }}/smsml_andi-irham:latest

      - name: Push Docker Image
        run: |
          docker push ${{ vars.DOCKERHUB_USERNAME }}/smsml_andi-irham:latest
