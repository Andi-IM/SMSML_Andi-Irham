name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CSV_URL: "healthcare_cybersecurity_preprocessing.csv"

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync

      - name: Run MLflow training
        run: |
          uv run python -m mlflow run . --experiment-name "Healthcare CVE Classification" --env-manager=local

      - name: Commit and push results
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: automated mlflow run results [skip ci]"
          file_pattern: 'mlruns/*'

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          # 1. Ambil Run ID terbaru dari eksperimen
          export MLFLOW_TRACKING_URI=file:./mlruns
          RUN_ID=$(uv run python -c "import mlflow; print(mlflow.search_runs(experiment_names=['Healthcare CVE Classification']).iloc[0].run_id)")
          echo "Building image for Run ID: $RUN_ID"
          
          # 2. Build Docker image menggunakan MLflow
          uv run mlflow models build-docker \
            -m "runs:/$RUN_ID/model" \
            -n "irham22ai/smsml_andi-irham:latest" \
            --install-mlflow
          
          # 3. Push ke Docker Hub
          docker push irham22ai/smsml_andi-irham:latest
